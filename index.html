<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000; /* Fundo preto para destacar o vídeo */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        #btn-comecar {
            padding: 20px 50px;
            font-size: 24px;
            background-color: #e31c25; /* Vermelho vibrante */
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(227, 28, 37, 0.6);
            transition: transform 0.2s, background-color 0.2s;
            z-index: 10;
        }

        #btn-comecar:active {
            transform: scale(0.95);
        }

        /* Animação de tremor visual */
        @keyframes tremor {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        .tremendo {
            animation: tremor 0.1s linear infinite;
        }

        #video-container {
            display: none;
            width: 100%;
            max-width: 500px;
            padding: 10px;
        }

        video {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <button id="btn-comecar" onclick="iniciarAcao()">CLIQUE PARA COMEÇAR</button>

    <div id="video-container">
        <video id="meuVideo" playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
            Seu navegador não suporta vídeos.
        </video>
    </div>

    <script>
        function iniciarAcao() {
            const btn = document.getElementById('btn-comecar');
            const videoDiv = document.getElementById('video-container');
            const videoPlayer = document.getElementById('meuVideo');

            // 1. Ativa a vibração real do celular (Android)
            if (navigator.vibrate) {
                // Padrão: vibra, pausa, vibra forte
                navigator.vibrate([200, 100, 200, 100, 800]);
            }

            // 2. Ativa o efeito visual no botão
            btn.classList.add('tremendo');
            btn.innerText = "CARREGANDO...";

            // 3. Pequeno delay para o efeito de "processamento"
            setTimeout(() => {
                btn.style.display = 'none';
                videoDiv.style.display = 'block';
                
                // Configura e dá play no vídeo
                videoPlayer.controls = true; // Mostra os controles agora
                videoPlayer.play().catch(e => {
                    console.log("Play automático bloqueado, o usuário verá os controles.");
                });

                // Para a vibração quando o vídeo abrir
                if (navigator.vibrate) navigator.vibrate(0);
            }, 1500);
        }
    </script>

</body>
</html>
